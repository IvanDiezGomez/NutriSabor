<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login NutriSabor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-page">
  <header>
    <h1>NutriSabor</h1>
  </header>

  <main class="login-main">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h2>Bienvenido a NutriSabor</h2>
          <p>Tu comida vegana favorita te espera</p>
        </div>

        <div class="form-tabs">
          <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
          <button class="tab-btn" onclick="switchTab('register')">Crear Cuenta</button>
        </div>

        <div id="login-form" class="form-section active">
          <form class="modern-form">
            <div class="input-group">
              <input id="page-login-email" type="email" class="modern-input" required />
              <label class="floating-label">Correo electrónico</label>
              <div class="input-line"></div>
            </div>

            <div class="input-group">
              <input id="page-login-password" type="password" class="modern-input" required />
              <label class="floating-label">Contraseña</label>
              <div class="input-line"></div>
            </div>

            <button class="btn modern-btn" onclick="loginFromPage()" type="button">
              <span>Iniciar Sesión</span>
              <div class="btn-shine"></div>
            </button>
          </form>
        </div>

        <div id="register-form" class="form-section">
          <form class="modern-form">
            <div class="input-group">
              <input id="new-name" class="modern-input" required />
              <label class="floating-label">Nombre completo</label>
              <div class="input-line"></div>
            </div>

            <div class="input-group">
              <input id="new-email" type="email" class="modern-input" required />
              <label class="floating-label">Correo electrónico</label>
              <div class="input-line"></div>
            </div>

            <div class="input-group">
              <input id="new-password" type="password" class="modern-input" required />
              <label class="floating-label">Contraseña</label>
              <div class="input-line"></div>
            </div>

            <div class="input-group">
              <select id="new-role" class="modern-select" required>
                <option value="user">Usuario</option>
                <option value="admin">Administrador</option>
              </select>
              <label class="floating-label select-label">Tipo de cuenta</label>
              <div class="input-line"></div>
            </div>

            <button class="btn modern-btn" onclick="createUser()" type="button">
              <span>Crear Cuenta</span>
              <div class="btn-shine"></div>
            </button>
          </form>
        </div>

        <div class="form-footer">
          <p>
            Al continuar, aceptas nuestros <a href="#" class="link">términos y condiciones</a>
          </p>
          <p>
            <a href="index.html" class="link">← Volver al inicio</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="./main.js"></script>
</body>
</html>
